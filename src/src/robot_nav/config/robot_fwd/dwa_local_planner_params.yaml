DWAPlannerROS:

# ==========================================
# 机器人物理参数 (Robot Configuration Parameters)
# ==========================================
  # x方向速度限制 (根据robot-R10能力设定)
  max_vel_x: 0.5            # 最大线速度 0.5 m/s
  min_vel_x: 0.0            # 最小线速度 0.0 m/s (不倒车，若需倒车改为负值)

  # y方向速度 (差速轮机器人不支持全向移动，故为0)
  max_vel_y: 0.0
  min_vel_y: 0.0

  # 平移速度 (Trans) 综合控制
  # 优化：max_vel_trans 不应超过 max_vel_x
  max_vel_trans: 0.5        # 最大平移速度
  # 优化：降低最小平移速度，允许机器人以更慢的速度精确对准目标
  min_vel_trans: 0.1        # 最小平移速度 (原0.4太高，会导致无法微调)

  # 旋转速度 (Rotational)
  # 优化：降低最大角速度以保证建图和导航的稳定性
  max_vel_theta: 2.0        # 最大角速度 rad/s (约115度/秒)
  min_vel_theta: 0.1        # 最小角速度 (防止电机低速抖动)

  # 加速度限制 (Acceleration Limits)
  # 优化：原配置(x:2.5, theta:5.0)对于轻量级小车过于暴力，容易打滑导致里程计漂移
  acc_lim_x: 1.2            # x方向加速度 m/s^2 (建议1.0~1.5)
  acc_lim_y: 0.0            # y方向加速度
  acc_lim_theta: 3.2        # 旋转加速度 rad/s^2 (建议3.0~3.5)
  acc_lim_trans: 1.2        # 平移加速度 (通常与acc_lim_x一致)

  trans_stopped_vel: 0.01
  theta_stopped_vel: 0.1

# ==========================================
# 目标容差 (Goal Tolerance Parameters)
# ==========================================
  # 优化：针对长0.4m的机器人，0.2m的误差可能导致它停在充电桩或门口外
  xy_goal_tolerance: 0.10       # 位置容差 10cm
  yaw_goal_tolerance: 0.10      # 角度容差 约0.1rad (5.7度)
  
  # 优化：开启锁定。当机器人到达容差范围内后，只进行旋转调整，不再为了几厘米反复前后移动
  latch_xy_goal_tolerance: true 

# ==========================================
# 前向模拟参数 (Forward Simulation Parameters)
# ==========================================
  # 优化：sim_time * max_vel_x = 前瞻距离。
  # 0.5m/s * 1.7s = 0.85m。这个距离在室内环境既能避障又不会反应迟钝。
  sim_time: 1.7             
  
  vx_samples: 20            # x速度采样点数
  vy_samples: 0             # y速度采样点数 (差速为0)
  vtheta_samples: 40        # 角速度采样点数
  controller_frequency: 10.0 # 控制频率 10Hz

# ==========================================
# 轨迹评分参数 (Trajectory Scoring Parameters)
# ==========================================
  # 路径距离权重：数值越大，机器人越贴合全局路径
  path_distance_bias: 32.0       
  
  # 目标距离权重：数值越大，机器人越倾向于直奔目标（可能导致切内角）
  goal_distance_bias: 20.0       
  
  # 避障权重：数值越大，机器人越害怕障碍物
  occdist_scale: 0.02            
  
  forward_point_distance: 0.325  # 评分点距离机器人中心的距离
  stop_time_buffer: 0.2          # 碰撞缓冲时间
  scaling_speed: 0.25            # 开始缩放足迹的速度阈值
  max_scaling_factor: 0.2        # 最大缩放因子

# ==========================================
# 防振荡参数 (Oscillation Prevention Parameters)
# ==========================================
  oscillation_reset_dist: 0.05   # 机器人移动超过0.05m才重置振荡标志

# ==========================================
# 调试参数 (Debugging)
# ==========================================
  publish_traj_pc : true         # 在Rviz中发布规划轨迹
  publish_cost_grid_pc: true     # 在Rviz中发布代价网格