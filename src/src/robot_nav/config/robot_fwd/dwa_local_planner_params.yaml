DWAPlannerROS:
  max_vel_x: 0.5
  min_vel_x: 0.0
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.5
  min_vel_trans: 0.1
  max_vel_theta: 2.0
  min_vel_theta: 0.1
  acc_lim_x: 1.2
  acc_lim_y: 0.0
  acc_lim_theta: 3.2
  acc_lim_trans: 1.2
  trans_stopped_vel: 0.01
  theta_stopped_vel: 0.1
